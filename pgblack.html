<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monetiza Insta - Saque Liberado</title>
    <style>
        :root {
            --primary-color: #d6005d;
            --bg-color: #f5f5f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-card {
            background: linear-gradient(135deg, #d6005d 0%, #ff4d94 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            margin-bottom: 20px;
        }
        .balance-label { font-size: 14px; opacity: 0.9; }
        .balance-value { font-size: 28px; font-weight: bold; }

        .progress-section { margin-bottom: 25px; }
        .progress-item { margin-bottom: 15px; }
        .label-group { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 100%; /* Simula tarefas completas */
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #666; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-saque {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-saque:hover { background-color: #b5004f; }
        
        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="30" alt="Insta">
        <span style="font-weight: bold; vertical-align: middle; margin-left: 5px;">MONETIZA INSTA</span>
    </div>

    <div class="balance-card">
        <div class="balance-label">Saldo disponível</div>
        <div class="balance-value">R$ 4.334,72</div>
    </div>

    <div class="progress-section">
        <div class="progress-item">
            <div class="label-group"><span>Vídeos assistidos</span><span>50/50</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
        <div class="progress-item">
            <div class="label-group"><span>Tempo na plataforma</span><span>1000/1000</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <div class="form-saque">
        <div class="input-group">
            <label>Tipo de chave PIX</label>
            <select>
                <option>CPF</option>
                <option>Telefone</option>
                <option>E-mail</option>
            </select>
        </div>
        <div class="input-group">
            <label>Sua Chave PIX</label>
            <input type="text" placeholder="Digite sua chave aqui...">
        </div>
        
        <a href="SEU_LINK_DO_CHECKOUT_SIGILO_AQUI" class="btn-saque">
            SOLICITAR SAQUE AGORA
        </a>
    </div>

    <div class="footer-info">
        Contribuição de segurança exigida pelo Banco Central.
    </div>
</div>

</body>
</html>
