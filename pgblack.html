<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monetiza Insta - Processando Saque</title>
    <style>
        :root { --primary: #d6005d; --bg: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px 0; }
        .app-container { width: 90%; max-width: 420px; margin: auto; background: white; border-radius: 25px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { display: flex; align-items: center; margin-bottom: 20px; font-weight: 800; font-size: 18px; color: #333; }
        .header img { width: 32px; margin-right: 10px; }

        /* Card de Saldo com Animação */
        .balance-card { background: linear-gradient(135deg, #d6005d 0%, #ff4d94 100%); color: white; padding: 25px; border-radius: 18px; margin-bottom: 20px; }
        .balance-label { font-size: 13px; opacity: 0.9; margin-bottom: 5px; }
        .balance-value { font-size: 32px; font-weight: bold; }

        /* Barras de Progresso Animadas */
        .task-box { margin-bottom: 20px; }
        .task-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; font-weight: 600; }
        .progress-bg { height: 12px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 2.5s ease-out; }

        /* Formulário */
        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
        select, input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; box-sizing: border-box; }

        /* Botão Sigilo */
        .btn-sacar { 
            display: block; width: 100%; padding: 18px; background: var(--primary); color: white; 
            text-align: center; text-decoration: none; border-radius: 12px; font-weight: bold; 
            font-size: 17px; margin-top: 10px; box-shadow: 0 4px 15px rgba(214, 0, 93, 0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Insta">
        MONETIZA INSTA
    </div>

    <div class="balance-card">
        <div class="balance-label">Saldo disponível</div>
        <div class="balance-value">R$ <span id="saldo">0,00</span></div>
    </div>

    <div class="task-box">
        <div class="task-row"><span>Vídeos assistidos</span><span id="txt-vid">0/50</span></div>
        <div class="progress-bg"><div class="progress-fill" id="bar-vid"></div></div>

        <div class="task-row"><span>Tempo na plataforma</span><span id="txt-time">0/1000</span></div>
        <div class="progress-bg"><div class="progress-fill" id="bar-time"></div></div>
    </div>

    <div class="form-saque">
        <div class="form-group">
            <label>Tipo de chave PIX</label>
            <select>
                <option value="cpf">CPF</option>
                <option value="tel">Telefone</option>
                <option value="email">E-mail</option>
                <option value="aleatoria">Chave Aleatória</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sua Chave PIX</label>
            <input type="text" placeholder="Digite sua chave...">
        </div>
        
        <a href="SEU_LINK_DO_CHECKOUT_SIGILO_AQUI" class="btn-sacar">
            Sacar Agora
        </a>
    </div>
</div>

<script>
    // Função para animar o saldo e as barras ao carregar a página
    window.onload = function() {
        let saldoFinal = 4334.72;
        let saldoAtual = 0;
        let saldoElement = document.getElementById('saldo');
        
        // Animação do Saldo (Subindo)
        let countSaldo = setInterval(() => {
            saldoAtual += 103.50; // Velocidade do contador
            if (saldoAtual >= saldoFinal) {
                saldoElement.innerText = "4.334,72";
                clearInterval(countSaldo);
            } else {
                saldoElement.innerText = saldoAtual.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }
        }, 30);

        // Animação das Barras
        setTimeout(() => {
            document.getElementById('bar-vid').style.width = "100%";
            document.getElementById('bar-time').style.width = "100%";
            document.getElementById('txt-vid').innerText = "50/50";
            document.getElementById('txt-time').innerText = "1000/1000";
        }, 500);
    };
</script>

</body>
</html>
